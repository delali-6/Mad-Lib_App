<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mad Libs World{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <header class="site-header">
        <div class="container header-inner">
            <a href="{{ url_for('index') }}" class="logo">
                <span class="logo-emoji">📖</span>
                <span class="logo-text">Mad Libs World</span>
            </a>
            <nav class="site-nav">
                <a href="{{ url_for('index') }}" class="nav-link">🏠 Stories</a>
                <a href="{{ url_for('levels') }}" class="nav-link nav-link--challenge">🏆 Challenge Levels</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>Made with ❤️ for laughs, giggles, and general silliness.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}

</body>
</html>
